<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>{{ title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-success">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">
            GEST SPORT
        </a>

    </div>

</nav>

<div class="container mt-4">

    <h2 class="mb-4">
        Liste des Athlètes
    </h2>

    <table class="table table-striped table-bordered">

        <thead class="table-success">

        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Sexe</th>
            <th>Discipline</th>
            <th>Catégorie</th>
            <th>Province</th>
            <th>Niveau</th>
        </tr>

        </thead>

        <tbody>

        {% for athlete in athletes %}

        <tr>

            <td>{{ athlete.id }}</td>

            <td>{{ athlete.nom }}</td>

            <td>{{ athlete.prenom }}</td>

            <td>{{ athlete.sexe }}</td>

            <td>{{ athlete.discipline }}</td>

            <td>{{ athlete.categorie }}</td>

            <td>{{ athlete.province }}</td>

            <td>{{ athlete.niveau }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
