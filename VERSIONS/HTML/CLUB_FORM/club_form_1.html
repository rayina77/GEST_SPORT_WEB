{% extends "base.html" %}

{% block content %}

<div class="card shadow border-0">

```
<div class="card-body">

    <h2 class="mb-4">
        ➕ Nouveau Club
    </h2>

    <form method="post"
          action="/clubs/add">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Nom du club
                </label>

                <input
                    type="text"
                    name="nom"
                    class="form-control"
                    required>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Discipline
                </label>

                <input
                    type="text"
                    name="discipline"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Genre
                </label>

                <select
                    name="genre"
                    class="form-select">

                    <option value="Masculin">
                        Masculin
                    </option>

                    <option value="Féminin">
                        Féminin
                    </option>

                    <option value="Mixte">
                        Mixte
                    </option>

                </select>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Catégorie
                </label>

                <input
                    type="text"
                    name="categorie"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Ville
                </label>

                <input
                    type="text"
                    name="ville"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Province
                </label>

                <input
                    type="text"
                    name="province"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Latitude
                </label>

                <input
                    type="number"
                    step="any"
                    name="latitude"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Longitude
                </label>

                <input
                    type="number"
                    step="any"
                    name="longitude"
                    class="form-control">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">
                    Date de création
                </label>

                <input
                    type="date"
                    name="date_creation"
                    class="form-control">

            </div>

        </div>

        <hr>

        <button
            type="submit"
            class="btn btn-success">

            💾 Enregistrer

        </button>

        <a href="/clubs"
           class="btn btn-secondary">

            Annuler

        </a>

    </form>

</div>
```

</div>

{% endblock %}
